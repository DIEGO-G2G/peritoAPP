<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0d0d0d"/>
<title>PeritoApp Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--border:#2a2a2a;
  --accent:#f97316;--accent2:#fb923c;--text:#f0f0f0;--text2:#a0a0a0;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;width:100%;overflow:hidden;}
body{background:var(--bg);font-family:'Barlow',sans-serif;color:var(--text);overscroll-behavior:none;}
button,input,textarea{font-family:'Barlow',sans-serif;}
::-webkit-scrollbar{width:0;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes waveA{0%{height:15%}100%{height:85%}}
@keyframes waveB{0%{height:40%}100%{height:100%}}
@keyframes waveC{0%{height:20%}100%{height:70%}}
@keyframes waveD{0%{height:55%}100%{height:95%}}
@keyframes waveE{0%{height:10%}100%{height:60%}}
@keyframes recPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.9);}}
@keyframes checkBounce{0%{transform:scale(0);}70%{transform:scale(1.2);}100%{transform:scale(1);}}
.fadeUp{animation:fadeUp .25s cubic-bezier(.16,1,.3,1);}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.bigInput{
  width:100%;background:var(--surface2);border:2px solid var(--border);border-radius:14px;
  padding:16px 52px 16px 18px;color:var(--text);font-size:18px;font-weight:500;
  -webkit-appearance:none;outline:none;transition:border-color .2s;
}
.bigInput:focus{border-color:var(--accent);}
.bigInput::placeholder{color:#444;}
.bigTextarea{
  width:100%;background:var(--surface2);border:2px solid var(--border);border-radius:14px;
  padding:16px 18px;resize:none;color:var(--text);font-size:17px;line-height:1.6;
  outline:none;transition:border-color .2s;
}
.bigTextarea:focus{border-color:var(--accent);}
.bigTextarea::placeholder{color:#444;}
.btn{
  width:100%;padding:18px;border:none;border-radius:16px;
  font-size:18px;font-weight:700;letter-spacing:.5px;
  font-family:'Barlow Condensed',sans-serif;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:transform .12s,opacity .12s;-webkit-appearance:none;
}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--accent);color:#fff;}
.btn.secondary{background:var(--surface2);color:var(--text2);border:2px solid var(--border);}
.btn.success{background:var(--green);color:#fff;}
.btn.danger{background:#450a0a;color:#fca5a5;border:2px solid var(--red);}
.btn.sm{padding:12px;font-size:15px;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;margin:0 16px 14px;}
.fieldLabel{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;color:var(--text2);text-transform:uppercase;margin-bottom:8px;display:block;}
.micBtn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:all .15s;}
.waveBar{flex:1;border-radius:3px;background:var(--accent);min-height:4px;}
.coordVal{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--accent);letter-spacing:1px;}
.rcInput{
  width:100%;background:var(--surface2);border:3px solid var(--accent);border-radius:16px;
  padding:18px;color:var(--accent);font-size:22px;font-weight:700;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:3px;text-align:center;outline:none;
}
.rcInput.ok{border-color:var(--green);color:var(--green);}
.progressBar{height:4px;background:var(--surface2);}
.progressFill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s cubic-bezier(.16,1,.3,1);}
.bottomNav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100;}
.navItem{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px 4px;position:relative;}
.navIcon{font-size:22px;line-height:1;}
.navLabel{font-size:10px;font-weight:700;letter-spacing:.5px;font-family:'Barlow Condensed',sans-serif;}
.navBadge{position:absolute;top:2px;right:14%;background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.obsItem{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--surface2);border-radius:12px;margin-bottom:8px;border:1px solid var(--border);}
.obsNum{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--accent);flex-shrink:0;line-height:1.3;min-width:26px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:flex-end;}
.sheet{background:var(--surface);border-top:3px solid var(--accent);border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:520px;margin:0 auto;}
.nextBtn{position:sticky;bottom:80px;left:16px;right:16px;margin:0 16px;z-index:10;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useCallback,useEffect}=React;

const MAKE_WEBHOOK="https://hook.eu1.make.com/TU_WEBHOOK_AQUI";
const uid=()=>Math.random().toString(36).substr(2,9);
const fmtDate=(d=new Date())=>d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
const fmtTime=(d=new Date())=>d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
const cap=s=>s&&s.length>0?s[0].toUpperCase()+s.slice(1):s;

// ════════ SPEECH CLEANUP ════════════════════════════════════════
function cleanSpeech(text){
  if(!text||text.trim().length<2) return text;
  let t=text.replace(/\s+/g,' ').trim();
  // Remove "fin de observaciones"
  t=t.replace(/,?\s*fin\s+de\s+observaciones\.?\s*/gi,'').trim();
  // Split by correction markers
  const parts=t.split(/,?\s*(?:perdón|no\s+hombre|no\s+mujer|no\s+espera|o\s+mejor\s+dicho|quiero\s+decir)\s*,?\s*/gi)
    .map(p=>p.trim()).filter(Boolean);
  if(parts.length<=1) return cap(t);
  // For each correction, remove last word of current result and append correction
  let result=parts[0];
  for(let i=1;i<parts.length;i++){
    result=result.replace(/\s+\S+\s*$/,'').trim(); // remove last word
    result=(result+(result?' ':'')+parts[i]).replace(/\s{2,}/g,' ');
  }
  return cap(result.trim());
}

// ════════ NUMBER CONVERSION ══════════════════════════════════════
function spanishToNum(text){
  const norm=text.toLowerCase()
    .replace(/euros?|€/gi,'').replace(/\s+y\s+/g,' ').replace(/\s+/g,' ').trim();
  const ones={'cero':0,'un':1,'uno':1,'una':1,'dos':2,'tres':3,'cuatro':4,'cinco':5,'seis':6,'siete':7,'ocho':8,'nueve':9,'diez':10,'once':11,'doce':12,'trece':13,'catorce':14,'quince':15,'dieciséis':16,'dieciseis':16,'diecisiete':17,'dieciocho':18,'diecinueve':19,'veinte':20,'veintiuno':21,'veintidós':22,'veintidos':22,'veintitrés':23,'veintitres':23,'veinticuatro':24,'veinticinco':25,'veintiséis':26,'veintiseis':26,'veintisiete':27,'veintiocho':28,'veintinueve':29,'treinta':30,'cuarenta':40,'cincuenta':50,'sesenta':60,'setenta':70,'ochenta':80,'noventa':90};
  const hundreds={'cien':100,'ciento':100,'doscientos':200,'doscientas':200,'trescientos':300,'trescientas':300,'cuatrocientos':400,'cuatrocientas':400,'quinientos':500,'quinientas':500,'seiscientos':600,'seiscientas':600,'setecientos':700,'setecientas':700,'ochocientos':800,'ochocientas':800,'novecientos':900,'novecientas':900};
  const words=norm.split(/\s+/);
  let total=0,cur=0;
  for(const w of words){
    if(w==='mil'){cur=cur===0?1:cur;total+=cur*1000;cur=0;}
    else if(w==='millón'||w==='millon'||w==='millones'){cur=cur===0?1:cur;total+=cur*1000000;cur=0;}
    else if(hundreds[w]!==undefined) cur+=hundreds[w];
    else if(ones[w]!==undefined) cur+=ones[w];
  }
  total+=cur;
  return total>0?String(total):null;
}

// ════════ MIC HOOK ═══════════════════════════════════════════════
// ── CLAVE DEL FUNCIONAMIENTO CORRECTO ─────────────────────────────
// Nunca reiniciamos la misma instancia SR (eso reenvía resultados ya
// procesados y genera duplicados). Si Chrome para inesperadamente,
// creamos una NUEVA instancia y acumulamos el texto en un ref externo.
// El texto sólo se entrega a onFinish cuando el usuario pulsa Parar.
function useMic({onFinish,isNumber=false,onFinObs=null}){
  // Estado persistente en un único ref para evitar problemas de closure
  const S=useRef({active:false,text:'',rec:null,onFinish,isNumber,onFinObs});
  // Mantener callbacks actualizados sin recrear funciones
  useEffect(()=>{S.current.onFinish=onFinish;S.current.isNumber=isNumber;S.current.onFinObs=onFinObs;},[onFinish,isNumber,onFinObs]);

  const [on,setOn]=useState(false);
  const [preview,setPreview]=useState('');

  const deliver=useCallback(()=>{
    const{text,onFinish:fin,isNumber:isNum,onFinObs:finObs}=S.current;
    const raw=text.trim();
    S.current.text='';
    setPreview('');
    if(!raw) return;
    if(finObs&&/fin\s+de\s+observaciones/i.test(raw)){finObs(cleanSpeech(raw));return;}
    let cleaned=cleanSpeech(raw);
    if(isNum){const n=spanishToNum(cleaned);if(n)cleaned=n;}
    if(cleaned) fin(cleaned);
  },[]);

  const startInstance=useCallback(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR) return;
    // Crear siempre una NUEVA instancia — nunca reutilizar la anterior
    const r=new SR();
    r.lang='es-ES';
    r.continuous=true;
    r.interimResults=true;
    r.maxAlternatives=1;

    r.onresult=e=>{
      let interim='';
      // e.resultIndex marca desde qué índice son nuevos resultados
      // Sólo procesamos desde resultIndex en adelante — nunca desde 0
      for(let i=e.resultIndex;i<e.results.length;i++){
        const res=e.results[i];
        if(res.isFinal){
          const t=res[0].transcript;
          S.current.text+=t+' ';
          setPreview(S.current.text);
          // "fin de observaciones" → parar automáticamente
          if(S.current.onFinObs&&/fin\s+de\s+observaciones/i.test(t)){
            S.current.active=false;
            S.current.rec=null;
            try{r.stop();}catch(_){}
            setOn(false);
            deliver();
            return;
          }
        } else {
          interim+=res[0].transcript;
        }
      }
      if(interim) setPreview(S.current.text+interim);
    };

    r.onerror=e=>{
      // 'no-speech' y 'aborted' son normales, ignorar
      if(e.error==='no-speech'||e.error==='aborted') return;
      console.warn('SR error:',e.error);
    };

    r.onend=()=>{
      // Si el usuario ya paró (active=false), no hacer nada
      if(!S.current.active) return;
      // Chrome paró solo (pausa larga, etc.) → nueva instancia
      // Comprobamos que sigue siendo la instancia actual antes de reiniciar
      if(S.current.rec===r){
        S.current.rec=null;
        // Pequeño delay para evitar que Chrome bloquee la reapertura inmediata
        setTimeout(()=>{
          if(S.current.active) startInstance();
        },250);
      }
    };

    S.current.rec=r;
    try{r.start();}catch(e){console.warn('No se pudo iniciar SR:',e);}
  },[deliver]);

  const toggle=useCallback(()=>{
    if(S.current.active){
      // PARAR → entregar texto acumulado
      S.current.active=false;
      const rec=S.current.rec;
      S.current.rec=null;
      try{rec?.stop();}catch(_){}
      setOn(false);
      deliver();
    } else {
      // INICIAR → limpiar y arrancar nueva instancia
      S.current.text='';
      S.current.active=true;
      setPreview('');
      setOn(true);
      startInstance();
    }
  },[deliver,startInstance]);

  const stop=useCallback(()=>{
    if(!S.current.active) return;
    S.current.active=false;
    const rec=S.current.rec;
    S.current.rec=null;
    try{rec?.stop();}catch(_){}
    setOn(false);
    S.current.text='';
    setPreview('');
  },[]);

  return{on,toggle,stop,preview};
}

// ════════ WAVEFORM ════════════════════════════════════════════════
const WANIMS=['waveA','waveB','waveC','waveD','waveE'];
function Waveform({active}){
  return(
    <div style={{display:'flex',gap:3,alignItems:'center',height:50,padding:'4px 6px',background:'rgba(249,115,22,.07)',borderRadius:12}}>
      {Array.from({length:24}).map((_,i)=>(
        <div key={i} className="waveBar" style={{
          background:active?'var(--accent)':'#2a2a2a',
          height:active?undefined:'4px',
          animation:active?`${WANIMS[i%5]} ${.3+(i%4)*.12}s ease-in-out infinite alternate`:'none',
          animationDelay:active?`${i*.045}s`:'0s',
          transition:'background .3s',
        }}/>
      ))}
    </div>
  );
}

// ════════ MIC FIELD ════════════════════════════════════════════════
function MicField({label,value,onChange,placeholder,type='text',half,multiline,rows=4,isNumber=false}){
  const onFinish=useCallback(t=>onChange(value+t),[value,onChange]);
  const mic=useMic({onFinish,isNumber});
  return(
    <div style={{flex:half?1:undefined,marginBottom:16}}>
      <label className="fieldLabel">{label}</label>
      <div style={{position:'relative'}}>
        {multiline
          ?<textarea className="bigTextarea" value={value} onChange={e=>onChange(e.target.value)}
              placeholder={placeholder} rows={rows} style={{borderColor:mic.on?'var(--red)':undefined}}/>
          :<input className="bigInput" type={type} value={value} onChange={e=>onChange(e.target.value)}
              placeholder={placeholder} style={{borderColor:mic.on?'var(--red)':undefined}}/>
        }
        {!multiline&&(
          <button onClick={mic.toggle} className="micBtn"
            style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',
              background:mic.on?'var(--red)':'var(--surface)',border:`1px solid ${mic.on?'var(--red)':'var(--border)'}`,
              boxShadow:mic.on?'0 0 0 6px rgba(239,68,68,.15)':undefined}}>
            🎙️
          </button>
        )}
      </div>
      {mic.on&&(
        <div style={{marginTop:10,background:'#0d0d0d',border:'2px solid var(--red)',borderRadius:14,padding:14}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:'var(--red)',animation:'recPulse 1s ease infinite'}}/>
            <span style={{fontFamily:'Barlow Condensed',fontSize:16,fontWeight:700,color:'var(--red)',letterSpacing:1}}>ESCUCHANDO...</span>
          </div>
          <Waveform active={true}/>
          {mic.preview&&<div style={{marginTop:8,fontSize:13,color:'#666',lineHeight:1.5,maxHeight:56,overflow:'hidden'}}>{mic.preview}</div>}
          <button onClick={mic.toggle} className="btn danger sm" style={{marginTop:12}}>⏹ PARAR Y PROCESAR</button>
        </div>
      )}
      {multiline&&!mic.on&&(
        <button onClick={mic.toggle} className="btn secondary sm" style={{marginTop:8}}>🎙️ DICTAR TEXTO</button>
      )}
      {multiline&&mic.on&&(
        <div style={{marginTop:10,background:'#0d0d0d',border:'2px solid var(--red)',borderRadius:14,padding:14}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:'var(--red)',animation:'recPulse 1s ease infinite'}}/>
            <span style={{fontFamily:'Barlow Condensed',fontSize:16,fontWeight:700,color:'var(--red)',letterSpacing:1}}>ESCUCHANDO — toca para parar</span>
          </div>
          <Waveform active={true}/>
          {mic.preview&&<div style={{marginTop:8,fontSize:13,color:'#666',lineHeight:1.5,maxHeight:72,overflow:'hidden'}}>{mic.preview}</div>}
          <button onClick={mic.toggle} className="btn danger sm" style={{marginTop:12}}>⏹ PARAR Y PROCESAR</button>
        </div>
      )}
    </div>
  );
}

// ════════ OBSERVACIONES FIELD ══════════════════════════════════════
function ObsField({obs,onChange}){
  const [manText,setManText]=useState('');
  const [showMan,setShowMan]=useState(false);

  const onFinObs=useCallback(rawText=>{
    // Split by sentence boundaries (periods, numbered items)
    const items=rawText
      .split(/\.\s+|\n/)
      .map(s=>s.replace(/^\d+[.)]\s*/,'').trim())
      .filter(s=>s.length>4);
    if(items.length>0) onChange([...obs,...items]);
    else if(rawText.trim().length>4) onChange([...obs,rawText.trim()]);
  },[obs,onChange]);

  const onFinish=useCallback(t=>{
    if(t.trim().length>4) onChange([...obs,t.trim()]);
  },[obs,onChange]);

  const mic=useMic({onFinish,onFinObs});

  const addManual=()=>{if(manText.trim().length>2){onChange([...obs,manText.trim()]);setManText('');setShowMan(false);}};

  return(
    <div style={{marginBottom:16}}>
      <label className="fieldLabel">OBSERVACIONES</label>
      <div style={{fontSize:14,color:'var(--text2)',marginBottom:12,lineHeight:1.6,background:'var(--surface2)',borderRadius:12,padding:'10px 14px',border:'1px solid var(--border)'}}>
        💡 Di todas las observaciones seguidas. El sistema las numerará automáticamente.<br/>
        Di <b style={{color:'var(--accent)'}}>"fin de observaciones"</b> para terminar el audio.
      </div>

      {obs.length>0&&(
        <div style={{marginBottom:12}}>
          {obs.map((o,i)=>(
            <div key={i} className="obsItem">
              <span className="obsNum">{i+1}.</span>
              <span style={{fontSize:16,color:'var(--text)',lineHeight:1.5,flex:1}}>{o}</span>
              <button onClick={()=>onChange(obs.filter((_,j)=>j!==i))}
                style={{background:'none',border:'none',color:'var(--red)',fontSize:18,cursor:'pointer',padding:'0 4px',flexShrink:0}}>✕</button>
            </div>
          ))}
        </div>
      )}

      {mic.on&&(
        <div style={{background:'#0d0d0d',border:'2px solid var(--red)',borderRadius:14,padding:16,marginBottom:10}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
            <div style={{width:12,height:12,borderRadius:'50%',background:'var(--red)',animation:'recPulse 1s ease infinite',flexShrink:0}}/>
            <span style={{fontFamily:'Barlow Condensed',fontSize:17,fontWeight:700,color:'var(--red)',lineHeight:1.3}}>
              ESCUCHANDO OBSERVACIONES...<br/>
              <span style={{fontSize:13,color:'#f87171',fontWeight:400}}>Di "fin de observaciones" para terminar</span>
            </span>
          </div>
          <Waveform active={true}/>
          {mic.preview&&(
            <div style={{marginTop:10,fontSize:14,color:'#777',lineHeight:1.5,maxHeight:80,overflow:'hidden',fontStyle:'italic'}}>
              {mic.preview}
            </div>
          )}
          <button onClick={mic.toggle} className="btn danger sm" style={{marginTop:12}}>⏹ PARAR Y NUMERAR</button>
        </div>
      )}

      {!mic.on&&!showMan&&(
        <div style={{display:'flex',gap:10}}>
          <button onClick={mic.toggle} className="btn primary" style={{flex:3,padding:'16px'}}>🎙️ DICTAR OBSERVACIONES</button>
          <button onClick={()=>setShowMan(true)} className="btn secondary" style={{flex:1,padding:'16px',fontSize:16}}>✍️</button>
        </div>
      )}

      {showMan&&(
        <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:14,padding:14}}>
          <label className="fieldLabel">ESCRIBIR OBSERVACIÓN</label>
          <textarea className="bigTextarea" value={manText} onChange={e=>setManText(e.target.value)} rows={2}
            placeholder="Escribe la observación..." style={{marginBottom:10}}/>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>{setShowMan(false);setManText('');}} className="btn secondary sm" style={{flex:1}}>CANCELAR</button>
            <button onClick={addManual} className="btn primary sm" style={{flex:2}}>✓ AÑADIR</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ════════ PANTALLA INICIO ═════════════════════════════════════════
function PantallaInicio({S,setTab,pct,steps}){
  return(
    <div className="screen fadeUp">
      <div style={{background:'linear-gradient(160deg,#1a0d00 0%,#0d0d0d 65%)',padding:'28px 20px 24px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-20,right:-20,fontSize:110,opacity:.05,lineHeight:1,userSelect:'none'}}>🛡️</div>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:18}}>
          <span style={{fontSize:30}}>🛡️</span>
          <div>

// ════════ PANTALLA FOTOS (WIZARD) ══════════════════════════════════
function PantallaFotos({S,setS,setTab}){
  const [step,setStep]=useState('camera'); // 'camera'|'caption'|'gallery'
  const [curPhoto,setCurPhoto]=useState(null);
  const [curCap,setCurCap]=useState('');
  const fileRef=useRef();

  const onFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{setCurPhoto(ev.target.result);setCurCap('');setStep('caption');};
    r.readAsDataURL(f);e.target.value='';
  };

  const saveAndNext=()=>{
    setS(s=>({...s,fotos:[...s.fotos,{id:uid(),dataUrl:curPhoto,caption:curCap}]}));
    setCurPhoto(null);setCurCap('');setStep('camera');
  };

  const finish=()=>{
    if(curPhoto) setS(s=>({...s,fotos:[...s.fotos,{id:uid(),dataUrl:curPhoto,caption:curCap}]}));
    else {} // no current photo
    setStep('gallery');
  };

  const onCapFinish=useCallback(t=>setCurCap(p=>p+t),[]);
  const mic=useMic({onFinish:onCapFinish});

  // STEP: CAMERA
  if(step==='camera') return(
    <div className="screen fadeUp">
      <div style={{background:'linear-gradient(135deg,#001a10,#0d0d0d)',padding:'22px 20px 16px'}}>
        <div style={{fontFamily:'Barlow Condensed',fontSize:11,color:'var(--green)',letterSpacing:3,marginBottom:4}}>PASO 2 DE 4</div>
        <div style={{fontFamily:'Barlow Condensed',fontSize:32,fontWeight:900,color:'var(--text)',lineHeight:1.05}}>FOTOGRAFÍAS<br/>DEL SINIESTRO</div>
        <div style={{fontSize:14,color:'var(--text2)',marginTop:6}}>
          {S.fotos.length>0
            ?<span style={{color:'var(--green)',fontWeight:600}}>✓ {S.fotos.length} foto{S.fotos.length!==1?'s':''} guardada{S.fotos.length!==1?'s':''}</span>
            :'Toma las fotos de los daños'}
        </div>
      </div>
      <div className="content" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 24px 140px',gap:20}}>
        <div style={{fontSize:100,lineHeight:1,opacity:.6}}>📷</div>
        <div style={{fontFamily:'Barlow Condensed',fontSize:26,fontWeight:700,color:'var(--text)',textAlign:'center',lineHeight:1.2}}>
          Toma la siguiente fotografía<br/>del siniestro
        </div>
        <div style={{fontSize:16,color:'var(--text2)',textAlign:'center',lineHeight:1.5}}>
          Tras cada foto añadirás el pie de foto con el micrófono
        </div>
        <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={onFile} style={{display:'none'}}/>
        <button onClick={()=>fileRef.current.click()} className="btn primary" style={{width:'100%',fontSize:22,padding:'22px'}}>
          📷 TOMAR FOTO
        </button>
        {S.fotos.length>0&&(
          <button onClick={()=>setStep('gallery')} className="btn secondary" style={{width:'100%',fontSize:18,padding:'18px'}}>
            📋 VER FOTOS GUARDADAS ({S.fotos.length}) Y CONTINUAR →
          </button>
        )}
      </div>
    </div>
  );

  // STEP: CAPTION
  if(step==='caption') return(
    <div className="screen fadeUp">
      <div style={{background:'linear-gradient(135deg,#001a10,#0d0d0d)',padding:'18px 20px 14px'}}>
        <div style={{fontFamily:'Barlow Condensed',fontSize:11,color:'var(--green)',letterSpacing:3,marginBottom:4}}>
          FOTO {S.fotos.length+1} — AÑADIR PIE DE FOTO
        </div>
        <div style={{fontFamily:'Barlow Condensed',fontSize:26,fontWeight:900,color:'var(--text)'}}>PIE DE FOTO</div>
      </div>
      <div className="content" style={{padding:'16px',display:'flex',flexDirection:'column',gap:14,paddingBottom:80}}>
        {/* PHOTO PREVIEW */}
        <img src={curPhoto} style={{width:'100%',maxHeight:260,objectFit:'cover',borderRadius:18,border:'2px solid var(--border)'}}/>

        {/* CAPTION INPUT */}
        <div>
          <label className="fieldLabel">PIE DE FOTO (VOZ O TEXTO)</label>
          <div style={{position:'relative'}}>
            <textarea className="bigTextarea" value={curCap} onChange={e=>setCurCap(e.target.value)} rows={3}
              placeholder="Describe el daño visible en esta fotografía..."
              style={{borderColor:mic.on?'var(--red)':undefined,paddingBottom:50}}/>
          </div>
          {!mic.on&&(
            <button onClick={mic.toggle} className="btn secondary sm" style={{marginTop:8}}>🎙️ DICTAR PIE DE FOTO</button>
          )}
          {mic.on&&(
            <div style={{marginTop:10,background:'#0d0d0d',border:'2px solid var(--red)',borderRadius:14,padding:14}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                <div style={{width:10,height:10,borderRadius:'50%',background:'var(--red)',animation:'recPulse 1s ease infinite'}}/>
                <span style={{fontFamily:'Barlow Condensed',fontSize:16,fontWeight:700,color:'var(--red)'}}>ESCUCHANDO...</span>
              </div>
              <Waveform active={true}/>
              {mic.preview&&<div style={{marginTop:8,fontSize:13,color:'#666',maxHeight:50,overflow:'hidden'}}>{mic.preview}</div>}
              <button onClick={mic.toggle} className="btn danger sm" style={{marginTop:10}}>⏹ PARAR DICTADO</button>
            </div>
          )}
        </div>

        {/* ACTION BUTTONS */}
        <div style={{display:'flex',gap:12,paddingBottom:8}}>
          <button onClick={saveAndNext} className="btn primary" style={{flex:2,fontSize:17,padding:'18px'}}>
            💾 GUARDAR Y SIGUIENTE FOTO
          </button>
          <button onClick={finish} className="btn success" style={{flex:1,fontSize:14,padding:'18px'}}>
            ✓ FINALIZAR<br/>FOTOS
          </button>
        </div>
      </div>
    </div>
  );

  // STEP: GALLERY
  return(
    <div className="screen fadeUp">
      <div style={{background:'linear-gradient(135deg,#001a10,#0d0d0d)',padding:'22px 20px 16px'}}>
        <div style={{fontFamily:'Barlow Condensed',fontSize:11,color:'var(--green)',letterSpacing:3,marginBottom:4}}>PASO 2 DE 4 — COMPLETADO</div>
        <div style={{fontFamily:'Barlow Condensed',fontSize:32,fontWeight:900,color:'var(--green)',lineHeight:1.05}}>
          ✓ {S.fotos.length} FOTOS<br/>GUARDADAS
        </div>
      </div>
      <div className="content" style={{padding:'14px 0 140px'}}>
        {S.fotos.map((f,i)=>(
          <div key={f.id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:20,overflow:'hidden',margin:'0 16px 14px'}}>
            <div style={{background:'var(--surface2)',padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontFamily:'Barlow Condensed',fontSize:18,fontWeight:700,color:'var(--text2)'}}>FOTO {i+1}</span>
              <span style={{fontSize:13,fontWeight:600,color:f.caption?'var(--green)':'var(--text2)'}}>{f.caption?'✓ Con pie':'Sin pie'}</span>
            </div>
            <img src={f.dataUrl} style={{width:'100%',maxHeight:200,objectFit:'cover',display:'block'}}/>
            {f.caption&&<div style={{padding:'12px 16px',fontSize:15,color:'var(--text)',lineHeight:1.5}}>{f.caption}</div>}
          </div>
        ))}
        <div style={{padding:'8px 16px'}}>
          <button onClick={()=>setStep('camera')} className="btn secondary" style={{marginBottom:10,fontSize:16}}>
            📷 AÑADIR MÁS FOTOS
          </button>
        </div>
      </div>
      <div className="nextBtn">
        <button onClick={()=>setTab('narracion')} className="btn primary" style={{fontSize:20,padding:'20px'}}>
          GUARDAR Y CONTINUAR → NARRACIÓN
        </button>
      </div>
    </div>
  );
}

// ════════ PANTALLA CATASTRO ═══════════════════════════════════════
function PantallaCatastro({S,setS,addLog,setTab}){
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [copied,setCopied]=useState('');

  const geolocate=async()=>{
    setLoading(true);setErr('');
    try{
      const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true,timeout:15000}));
      const{latitude:lat,longitude:lon,accuracy}=pos.coords;
      setS(s=>({...s,gps:{lat,lon,accuracy}}));
      addLog('GPS: '+lat.toFixed(6)+', '+lon.toFixed(6)+' (±'+Math.round(accuracy)+'m)');
      if(accuracy>100)addLog('⚠️ Precisión baja. Sal al exterior.','error');
      else addLog('✓ Precisión OK','success');
    }catch(e){
      setErr(e.code===1?'Permiso denegado. Activa ubicación en Ajustes de Chrome.':e.message);
    }
    setLoading(false);
  };

  const copiar=async(campo,val)=>{
    try{await navigator.clipboard.writeText(String(val));setCopied(campo);setTimeout(()=>setCopied(''),3000);}catch(e){}
  };

  const setRC=v=>setS(s=>({...s,rcManual:v.toUpperCase(),catastro:v?{rc:v.toUpperCase(),direccion:'Referencia introducida manualmente',manual:true}:null}));
  const rcOk=S.catastro?.rc?.length>=7;

  return(
    <div className="screen fadeUp">
      <div style={{background:'linear-gradient(135deg,#0d1a00,#0d0d0d)',padding:'22px 20px 16px'}}>
        <div style={{fontFamily:'Barlow Condensed',fontSize:11,color:'#a3e635',letterSpacing:3,marginBottom:4}}>PASO 4 DE 4</div>
        <div style={{fontFamily:'Barlow Condensed',fontSize:32,fontWeight:900,color:'var(--text)',lineHeight:1.05}}>REFERENCIA<br/>CATASTRAL</div>
        <div style={{fontSize:14,color:'var(--text2)',marginTop:6}}>3 pasos para identificar la finca</div>
      </div>
      <div className="content" style={{padding:'16px 0 140px'}}>
        {/* P1 GPS */}
        <div className="card">
          <div style={{fontFamily:'Barlow Condensed',fontSize:20,fontWeight:800,color:'var(--accent)',marginBottom:14}}>1️⃣ OBTENER POSICIÓN GPS</div>
          {!S.gps&&!loading&&<button onClick={geolocate} className="btn primary">📍 OBTENER MI POSICIÓN GPS</button>}
          {loading&&(
            <div style={{display:'flex',alignItems:'center',gap:14,padding:16,background:'var(--surface2)',borderRadius:14}}>
              <div style={{width:28,height:28,borderRadius:'50%',border:'3px solid var(--border)',borderTopColor:'var(--accent)',animation:'spin .8s linear infinite',flexShrink:0}}/>
              <span style={{fontFamily:'Barlow Condensed',fontSize:20,fontWeight:700,color:'var(--accent)'}}>OBTENIENDO GPS...</span>
            </div>
          )}
          {err&&<div style={{background:'#450a0a',border:'1px solid var(--red)',borderRadius:14,padding:'14px 16px',fontSize:16,color:'#fca5a5',marginTop:8}}>⚠️ {err}</div>}
          {S.gps&&(
            <div>
              {[['lat','LATITUD (copia primero)',S.gps.lat.toFixed(6)],['lon','LONGITUD (copia después)',S.gps.lon.toFixed(6)]].map(([id,label,val])=>(
                <div key={id} style={{background:'var(--surface2)',borderRadius:14,padding:'14px 16px',marginBottom:10,display:'flex',alignItems:'center',justifyContent:'space-between',border:'1px solid var(--border)'}}>
                  <div>
                    <div style={{fontSize:11,color:'var(--text2)',letterSpacing:1,fontWeight:600,marginBottom:4}}>{label}</div>
                    <div className="coordVal">{val}</div>
                  </div>
                  <button onClick={()=>copiar(id,val)} style={{padding:'10px 14px',background:copied===id?'#052e16':'var(--surface)',border:'1px solid '+(copied===id?'var(--green)':'var(--border)'),borderRadius:10,color:copied===id?'var(--green)':'var(--text2)',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'Barlow Condensed',letterSpacing:1}}>
                    {copied===id?'✓ COPIADA':'📋 COPIAR'}
                  </button>
                </div>
              ))}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:15,color:S.gps.accuracy>100?'#fca5a5':'var(--green)',fontWeight:600}}>Precisión: ±{Math.round(S.gps.accuracy)}m {S.gps.accuracy>100?'⚠️':'✓'}</span>
                <button onClick={geolocate} style={{padding:'8px 14px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:10,color:'var(--text2)',fontSize:14,fontWeight:600,cursor:'pointer'}}>↺ Repetir</button>
              </div>
            </div>
          )}
        </div>

        {/* P2 CATASTRO */}
        <div className="card">
          <div style={{fontFamily:'Barlow Condensed',fontSize:20,fontWeight:800,color:'var(--accent)',marginBottom:12}}>2️⃣ BUSCAR PARCELA EN CATASTRO</div>
          <div style={{background:'var(--surface2)',borderRadius:12,padding:'12px 16px',marginBottom:14,fontSize:15,color:'var(--text2)',lineHeight:1.8}}>
            ➊ Copia <b style={{color:'var(--accent)'}}>Latitud</b> → abre Catastro<br/>
            ➋ Pestaña <b style={{color:'var(--accent)'}}>"Coordenadas"</b> → pega Latitud<br/>
            ➌ Vuelve aquí → copia <b style={{color:'var(--accent)'}}>Longitud</b> → pégala<br/>
            ➍ <b style={{color:'var(--accent)'}}>"Buscar"</b> → toca la parcela correcta<br/>
            ➎ Copia la RC → vuelve (← atrás) → Paso 3
          </div>
          <a href="https://www1.sedecatastro.gob.es/CYCBienInmueble/OVCBusqueda.aspx" target="_blank" rel="noreferrer"
            className="btn primary" style={{display:'flex',textDecoration:'none',marginTop:0}}>
            🗺️ ABRIR SEDE CATASTRO
          </a>
        </div>

        {/* P3 RC */}
        <div className="card">
          <div style={{fontFamily:'Barlow Condensed',fontSize:20,fontWeight:800,color:'var(--accent)',marginBottom:12}}>3️⃣ PEGAR REFERENCIA CATASTRAL</div>
          <label className="fieldLabel">REFERENCIA CATASTRAL (20 CARACTERES)</label>
          <input className={'rcInput'+(rcOk?' ok':'')} value={S.rcManual||''} onChange={e=>setRC(e.target.value)} placeholder="9872023VH5797S0001WX" maxLength={20}/>
          <div style={{marginTop:8,textAlign:'center',fontSize:14,color:'var(--text2)'}}>{(S.rcManual||'').length}/20</div>
          {rcOk&&(
            <div style={{background:'#052e16',border:'2px solid var(--green)',borderRadius:16,padding:16,textAlign:'center',marginTop:14}}>
              <div style={{fontFamily:'Barlow Condensed',fontSize:24,fontWeight:900,color:'#86efac',letterSpacing:3,marginBottom:6}}>{S.catastro.rc}</div>
              <div style={{fontSize:15,color:'#4ade80'}}>✓ Referencia catastral confirmada</div>
              <a href={'https://www1.sedecatastro.gob.es/CYCBienInmueble/OVCListaBienes.aspx?del=&mun=&rc1='+S.catastro.rc.substring(0,7)+'&rc2='+S.catastro.rc.substring(7,14)}
                 target="_blank" rel="noreferrer" style={{display:'block',marginTop:8,fontSize:14,color:'#60a5fa',textDecoration:'none'}}>
                🔗 Ver ficha catastral completa →
              </a>
            </div>
          )}
        </div>
      </div>
      <div className="nextBtn">
        <button onClick={()=>setTab('envio')} className="btn primary" style={{fontSize:20,padding:'20px'}}>
          GUARDAR Y CONTINUAR → ENVÍO
        </button>
      </div>
    </div>
  );
}

// ════════ PANTALLA ENVÍO ══════════════════════════════════════════
function PantallaEnvio({S,setS,addLog}){
  const [phase,setPhase]=useState('idle');
  const [detail,setDetail]=useState('');
  const esDemo=MAKE_WEBHOOK.includes('TU_WEBHOOK');

  const issues=[];
  if(!S.poliza)issues.push('Nº de póliza vacío');
  if(!S.asegurado)issues.push('Asegurado vacío');
  if(!S.perito)issues.push('Perito vacío');
  if(S.fotos.length===0)issues.push('Sin fotografías');
  if(!(S.causa||'').length&&!(S.efecto||'').length)issues.push('Narración vacía (causa y efecto)');
  if(!S.catastro)issues.push('Sin referencia catastral');

  const enviar=async()=>{
    if(esDemo){setPhase('demo');return;}
    setPhase('sending');setDetail('Conectando con Make.com...');
    const payload={
      expediente:{id:S.id,poliza:S.poliza,asegurado:S.asegurado,perito:S.perito,
        fecha_siniestro:S.fechaSiniestro,fecha_visita:S.fechaVisita,hora_visita:S.horaVisita,
        expediente_cia:S.expCia,cobertura:S.cobertura,motivo_cobertura:S.motivoCob,
        causa:S.causa,efecto:S.efecto,valoracion:S.valoracion,
        observaciones:S.observaciones||[]},
      gps:S.gps,catastro:S.catastro,
      fotos:S.fotos.map(f=>({id:f.id,caption:f.caption,dataUrl:f.dataUrl})),
      metadata:{timestamp:new Date().toISOString(),carpeta:'peritos/'+S.poliza+'/'+S.id}
    };
    try{
      const res=await fetch(MAKE_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(!res.ok)throw new Error('HTTP '+res.status);
      setPhase('done');setS(s=>({...s,estado:'completado'}));
      addLog('Enviado a Make.com','success');
    }catch(e){
      setPhase('error');setDetail(e.message);
      setS(s=>({...s,estado:'error'}));
    }
  };

  return(
    <div className="screen fadeUp">
      <div style={{background:'linear-gradient(135deg,#1a1000,#0d0d0d)',padding:'22px 20px 16px'}}>
        <div style={{fontFamily:'Barlow Condensed',fontSize:11,color:'var(--yellow)',letterSpacing:3,marginBottom:4}}>ENVÍO DEL INFORME</div>
        <div style={{fontFamily:'Barlow Condensed',fontSize:32,fontWeight:900,color:'var(--text)',lineHeight:1.05}}>ENVIAR A<br/>MAKE.COM</div>
      </div>
      <div className="content" style={{padding:'16px 0 100px'}}>
        {esDemo&&(
          <div style={{margin:'0 16px 14px',background:'#1a0d00',border:'2px solid var(--accent)',borderRadius:20,padding:20}}>
            <div style={{fontFamily:'Barlow Condensed',fontSize:20,fontWeight:800,color:'var(--accent)',marginBottom:10}}>⚙️ WEBHOOK NO CONFIGURADO</div>
            <div style={{fontSize:15,color:'#fed7aa',lineHeight:1.8}}>
              La app funciona al 100% pero el envío real a Make está desactivado.<br/><br/>
              <b style={{color:'var(--accent)'}}>Para activarlo:</b><br/>
              1. Entra en <b>make.com</b> → nuevo escenario<br/>
              2. Módulo: <b>Webhooks → Custom Webhook</b><br/>
              3. Copia la URL generada por Make<br/>
              4. Abre <b>index.html</b> en editor de texto<br/>
              5. Línea 7: sustituye <b>TU_WEBHOOK_AQUI</b> por tu URL<br/>
              6. Sube el archivo actualizado a GitHub
            </div>
          </div>
        )}

        <div className="card">
          <div style={{fontFamily:'Barlow Condensed',fontSize:20,fontWeight:800,marginBottom:14}}>📋 RESUMEN DEL EXPEDIENTE</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {[['Póliza',S.poliza||'—'],['Asegurado',S.asegurado||'—'],['Perito',S.perito||'—'],['F.Siniestro',S.fechaSiniestro||'—'],['Fotografías',S.fotos.length+' fotos'],['Catastro',S.catastro?.rc||'—'],['Cobertura',(S.cobertura||'—').toUpperCase()],['Valoración',S.valoracion?S.valoracion+'€':'—'],['Observaciones',(S.observaciones||[]).length+' items']].map(([k,v])=>(
              <div key={k} style={{background:'var(--surface2)',borderRadius:12,padding:'12px 14px'}}>
                <div style={{fontSize:11,color:'var(--text2)',letterSpacing:1,marginBottom:3,fontWeight:600}}>{k}</div>
                <div style={{fontSize:15,color:'var(--text)',fontWeight:600,wordBreak:'break-all'}}>{v}</div>
              </div>
            ))}
          </div>
        </div>

        {(S.observaciones||[]).length>0&&(
          <div className="card">
            <div style={{fontFamily:'Barlow Condensed',fontSize:18,fontWeight:800,marginBottom:12}}>📝 OBSERVACIONES</div>
            {(S.observaciones||[]).map((o,i)=>(
              <div key={i} style={{display:'flex',gap:10,marginBottom:8}}>
                <span style={{fontFamily:'Barlow Condensed',fontSize:20,fontWeight:900,color:'var(--accent)',flexShrink:0}}>{i+1}.</span>
                <span style={{fontSize:15,color:'var(--text)',lineHeight:1.5}}>{o}</span>
              </div>
            ))}
          </div>
        )}

        {issues.length>0&&(
          <div className="card" style={{borderColor:'var(--yellow)'}}>
            <div style={{fontFamily:'Barlow Condensed',fontSize:20,fontWeight:800,color:'var(--yellow)',marginBottom:10}}>⚠️ PENDIENTE</div>
            {issues.map((iss,i)=><div key={i} style={{fontSize:16,color:'#fcd34d',marginBottom:8}}>⚠️ {iss}</div>)}
          </div>
        )}

        <div className="card">
          <div style={{fontFamily:'Barlow Condensed',fontSize:18,fontWeight:800,marginBottom:12}}>⚙️ FLUJO AUTOMÁTICO</div>
          {[['📱','PeritoApp','Fotos + narración + GPS + catastro'],['🔗','Webhook Make','Recibe el expediente completo'],['☁️','Google Drive','Sube fotos y catastro'],['🌐','Web Aseguradora','Rellena el formulario online'],['🤖','GPT-4o','Redacta el informe pericial'],['💾','Guarda','En la plataforma de la cía.'],['📬','Telegram','Notifica al perito ✓']].map(([ico,t,d],i,arr)=>(
            <div key={i}>
              <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:'var(--surface2)',borderRadius:12}}>
                <span style={{fontSize:22,flexShrink:0}}>{ico}</span>
                <div><div style={{fontFamily:'Barlow Condensed',fontSize:16,fontWeight:700,color:'var(--accent)',letterSpacing:.5}}>{t}</div><div style={{fontSize:13,color:'var(--text2)'}}>{d}</div></div>
              </div>
              {i<arr.length-1&&<div style={{textAlign:'center',fontSize:16,color:'var(--border)',lineHeight:1.3}}>↓</div>}
            </div>
          ))}
        </div>

        {phase==='sending'&&(
          <div style={{margin:'0 16px',display:'flex',gap:14,padding:20,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:18,alignItems:'center'}}>
            <div style={{width:32,height:32,borderRadius:'50%',border:'4px solid var(--border)',borderTopColor:'var(--accent)',animation:'spin .8s linear infinite',flexShrink:0}}/>
            <div><div style={{fontFamily:'Barlow Condensed',fontSize:22,fontWeight:800,color:'var(--accent)'}}>ENVIANDO...</div><div style={{fontSize:14,color:'var(--text2)',marginTop:2}}>{detail}</div></div>
          </div>
        )}
        {phase==='done'&&(
          <div style={{margin:'0 16px',background:'#052e16',border:'2px solid var(--green)',borderRadius:20,padding:32,textAlign:'center'}}>
            <div style={{fontSize:64,lineHeight:1}}>🎉</div>
            <div style={{fontFamily:'Barlow Condensed',fontSize:28,fontWeight:900,color:'var(--green)',marginTop:12}}>¡EXPEDIENTE ENVIADO!</div>
            <div style={{fontSize:16,color:'#d1d5db',marginTop:8,lineHeight:1.6}}>Make.com está procesando. Recibirás Telegram cuando el informe esté guardado.</div>
          </div>
        )}
        {phase==='error'&&(
          <div style={{margin:'0 16px',background:'#450a0a',border:'1px solid var(--red)',borderRadius:18,padding:20}}>
            <div style={{fontFamily:'Barlow Condensed',fontSize:22,fontWeight:800,color:'var(--red)'}}>ERROR</div>
            <div style={{fontSize:15,color:'#fca5a5',marginTop:6}}>{detail}</div>
          </div>
        )}
        {phase==='demo'&&(
          <div style={{margin:'0 16px',background:'#431407',border:'2px solid var(--accent)',borderRadius:18,padding:20,textAlign:'center'}}>
            <div style={{fontSize:36}}>⚙️</div>
            <div style={{fontFamily:'Barlow Condensed',fontSize:22,fontWeight:800,color:'var(--accent)',marginTop:8}}>CONFIGURA EL WEBHOOK</div>
            <div style={{fontSize:15,color:'#fed7aa',marginTop:6}}>Sigue las instrucciones del aviso naranja de arriba</div>
          </div>
        )}

        {(phase==='idle'||phase==='demo'||phase==='error')&&(
          <div style={{padding:'10px 16px'}}>
            <button onClick={enviar} disabled={issues.length>0} className={'btn '+(issues.length>0?'secondary':'primary')} style={{fontSize:20,padding:'22px'}}>
              {esDemo?'⚙️ VER CONFIGURACIÓN WEBHOOK':'🚀 ENVIAR EXPEDIENTE A MAKE.COM'}
            </button>
          </div>
        )}
        {phase==='done'&&(
          <div style={{padding:'10px 16px'}}>
            <button onClick={()=>setPhase('idle')} className="btn secondary" style={{fontSize:18,padding:'18px'}}>↺ Nuevo expediente</button>
          </div>
        )}
        {phase==='error'&&(
          <div style={{padding:'0 16px'}}>
            <button onClick={enviar} className="btn primary" style={{fontSize:18,padding:'18px',marginTop:10}}>↺ REINTENTAR</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ════════ APP ROOT ════════════════════════════════════════════════
function App(){
  const [tab,setTab]=useState('inicio');
  const [S,setS]=useState({
    id:uid(),poliza:'',asegurado:'',perito:'',
    fechaSiniestro:'',fechaVisita:fmtDate(),horaVisita:fmtTime(),expCia:'',
    fotos:[],causa:'',efecto:'',valoracion:'',observaciones:[],notas:'',
    cobertura:'',motivoCob:'',
    catastro:null,gps:null,rcManual:'',
    estado:'borrador',log:[]
  });
  const upd=(k,v)=>setS(s=>({...s,[k]:v}));
  const addLog=(msg,type='info')=>setS(s=>({...s,log:[...s.log,{msg,type,t:fmtTime()}]}));

  const steps=[
    {id:'datos',label:'Datos del expediente',done:!!(S.poliza&&S.asegurado&&S.perito),ico:'📋',tab:'datos'},
    {id:'fotos',label:'Fotografías del siniestro',done:S.fotos.length>0,ico:'📷',tab:'fotos'},
    {id:'narracion',label:'Causa, efecto y valoración',done:!!(S.causa||S.efecto),ico:'🎙️',tab:'narracion'},
    {id:'catastro',label:'Referencia catastral',done:!!(S.catastro?.rc),ico:'🏛️',tab:'catastro'},
  ];
  const pct=Math.round(steps.filter(s=>s.done).length/steps.length*100);
  const stateColor={borrador:'#f59e0b',subiendo:'#3b82f6',completado:'#22c55e',error:'#ef4444'};

  const navItems=[
    {id:'inicio',ico:'🏠',label:'INICIO'},
    {id:'datos',ico:'📋',label:'DATOS'},
    {id:'fotos',ico:'📷',label:'FOTOS',badge:S.fotos.length},
    {id:'narracion',ico:'🎙️',label:'VOZ'},
    {id:'catastro',ico:'🏛️',label:'RC'},
    {id:'envio',ico:'🚀',label:'ENVIAR'},
  ];

  return(
    <div style={{position:'fixed',inset:0,background:'var(--bg)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <style>{`
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes recPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.88);}}
        @keyframes checkBounce{0%{transform:scale(0);}70%{transform:scale(1.2);}100%{transform:scale(1);}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
      `}</style>

      {/* PROGRESS TOP */}
      <div className="progressBar"><div className="progressFill" style={{width:pct+'%'}}/></div>

      {/* SCREENS */}
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        {tab==='inicio'   &&<PantallaInicio    S={S} setTab={setTab} pct={pct} steps={steps}/>}
        {tab==='datos'    &&<PantallaDatos     S={S} upd={upd} setTab={setTab}/>}
        {tab==='fotos'    &&<PantallaFotos     S={S} setS={setS} setTab={setTab}/>}
        {tab==='narracion'&&<PantallaNarracion S={S} upd={upd} setTab={setTab}/>}
        {tab==='catastro' &&<PantallaCatastro  S={S} setS={setS} addLog={addLog} setTab={setTab}/>}
        {tab==='envio'    &&<PantallaEnvio     S={S} setS={setS} addLog={addLog}/>}
      </div>

      {/* BOTTOM NAV */}
      <div className="bottomNav">
        {navItems.map(it=>(
          <button key={it.id} className={'navItem'+(tab===it.id?' active':'')} onClick={()=>setTab(it.id)}>
            <span className="navIcon">{it.ico}</span>
            {it.badge>0&&<span className="navBadge">{it.badge}</span>}
            <span className="navLabel" style={{color:tab===it.id?'var(--accent)':'var(--text2)'}}>{it.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
